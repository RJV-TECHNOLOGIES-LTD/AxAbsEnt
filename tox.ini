[tox]
envlist = py38, py39, py310, py311, coverage, lint, type, docs, cpp, cuda, integration
isolated_build = True
skip_missing_interpreters = True

[testenv]
description = Run the test suite with pytest
extras = test
deps =
    pytest>=7.0.0
    pytest-cov>=4.0.0
    pytest-xdist>=3.0.0
    hypothesis>=6.0.0
commands =
    pytest {posargs:tests} --cov=src --cov-report=xml --cov-report=term -v

[testenv:coverage]
description = Generate coverage report
deps =
    {[testenv]deps}
    coverage>=7.0.0
commands =
    pytest {posargs:tests} --cov=src --cov-report=xml --cov-report=html --cov-report=term -v
    coverage report --fail-under=90

[testenv:lint]
description = Run code quality checks
deps =
    flake8>=6.0.0
    flake8-docstrings>=1.7.0
    flake8-bugbear>=23.0.0
    flake8-comprehensions>=3.10.0
    flake8-isort>=6.0.0
    black>=23.0.0
    isort>=5.12.0
commands =
    flake8 src tests
    black --check src tests
    isort --check-only --profile black src tests

[testenv:type]
description = Run static type checks
deps =
    mypy>=1.0.0
    types-setuptools
    types-requests
commands =
    mypy src tests

[testenv:docs]
description = Build documentation
deps =
    sphinx>=6.0.0
    sphinx-rtd-theme>=1.2.0
    myst-parser>=1.0.0
    nbsphinx>=0.9.0
    sphinx-autoapi>=2.1.0
changedir = docs
commands =
    sphinx-build -b html -d {envtmpdir}/doctrees . {envtmpdir}/html

[testenv:cpp]
description = Build and test C++ components
allowlist_externals =
    mkdir
    cmake
    make
    ctest
commands =
    mkdir -p {envtmpdir}/build
    cd {envtmpdir}/build && cmake {toxinidir}/cpp -DCMAKE_BUILD_TYPE=Debug -DBUILD_TESTING=ON
    cd {envtmpdir}/build && make -j4
    cd {envtmpdir}/build && ctest -V

[testenv:cuda]
description = Build and test CUDA components
allowlist_externals =
    mkdir
    cmake
    make
    ctest
commands =
    mkdir -p {envtmpdir}/build
    cd {envtmpdir}/build && cmake {toxinidir}/cuda -DCMAKE_BUILD_TYPE=Debug -DBUILD_TESTING=ON
    cd {envtmpdir}/build && make -j4
    cd {envtmpdir}/build && ctest -V

[testenv:integration]
description = Run integration tests between Python, C++, and CUDA components
deps =
    {[testenv]deps}
commands =
    pytest {posargs:tests/test_integration} -v

[testenv:benchmark]
description = Run performance benchmarks
deps =
    pytest-benchmark>=4.0.0
commands =
    pytest {posargs:benchmarks} --benchmark-autosave --benchmark-compare

[testenv:security]
description = Run security checks
deps =
    bandit>=1.7.0
    safety>=2.3.0
commands =
    bandit -r src -x src/tests
    safety check

[testenv:jupyter]
description = Install the package in development mode for use with Jupyter notebooks
deps =
    jupyter>=1.0.0
    ipykernel>=6.0.0
commands =
    pip install -e .
    python -m ipykernel install --user --name=axabsent

[testenv:dev]
description = Development environment with all dependencies
deps =
    {[testenv]deps}
    {[testenv:lint]deps}
    {[testenv:type]deps}
    {[testenv:docs]deps}
    {[testenv:benchmark]deps}
    {[testenv:security]deps}
    {[testenv:jupyter]deps}
    pre-commit>=3.0.0
commands =
    pip install -e .
    pre-commit install

[flake8]
max-line-length = 100
docstring-convention = numpy
ignore = E203, W503
exclude = 
    .tox,
    .git,
    __pycache__,
    build,
    dist,
    *.egg-info
per-file-ignores =
    tests/*:D100,D101,D102,D103

[pytest]
testpaths = tests
python_files = test_*.py
python_functions = test_*
markers =
    slow: marks tests as slow (deselect with '-m "not slow"')
    integration: marks tests as integration tests
    gpu: marks tests requiring GPU hardware
