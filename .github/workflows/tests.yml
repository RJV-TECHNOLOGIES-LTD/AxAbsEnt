# .github/workflows/tests.yml
name: Cross-Absolute Interaction Theory Test Suite

on:
  push:
    branches: [ main, dev ]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'publications/**'
  pull_request:
    branches: [ main, dev ]
  workflow_dispatch:
    inputs:
      debug_enabled:
        description: 'Run the workflow with tmate debugging enabled'
        required: false
        default: false

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  setup-test-matrix:
    name: 📋 Setup Test Matrix
    runs-on: ubuntu-latest
    outputs:
      python-matrix: ${{ steps.set-matrix.outputs.python-matrix }}
      os-matrix: ${{ steps.set-matrix.outputs.os-matrix }}
    steps:
      - id: set-matrix
        run: |
          echo "python-matrix=[\"3.9\", \"3.10\", \"3.11\"]" >> $GITHUB_OUTPUT
          echo "os-matrix=[\"ubuntu-latest\", \"macos-latest\", \"windows-latest\"]" >> $GITHUB_OUTPUT

  python-core-tests:
    name: 🐍 Python Core Tests (${{ matrix.python-version }}, ${{ matrix.os }})
    needs: setup-test-matrix
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        python-version: ${{ fromJson(needs.setup-test-matrix.outputs.python-matrix) }}
        os: ${{ fromJson(needs.setup-test-matrix.outputs.os-matrix) }}

    services:
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        # Redis service only on Linux
        if: matrix.os == 'ubuntu-latest'

    env:
      REDIS_HOST: ${{ matrix.os == 'ubuntu-latest' && 'localhost' || 'redis-mock' }}
      REDIS_PORT: 6379
      API_SECRET_KEY: test-key-${{ github.run_id }}
      PYTHONPATH: ${{ github.workspace }}

    steps:
      - name: ⬇️ Checkout repository
        uses: actions/checkout@v3

      - name: 🐍 Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'
          cache-dependency-path: |
            requirements*.txt
            pyproject.toml
            setup.py

      - name: 📦 Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install wheel setuptools
          python -m pip install -e .[dev,test,docs]
          # Alternative installation method
          if [ ! -f .install_success ]; then
            python -m pip install -r requirements.txt
            python -m pip install -r requirements-dev.txt
            python -m pip install -r requirements-docs.txt
            touch .install_success
          fi
        shell: bash

      - name: 🧪 Run core unit tests
        run: |
          python -m pytest tests/test_core tests/test_mathematics tests/test_utils --maxfail=5 --cov=src/core --cov=src/mathematics --cov=src/utils

      - name: 🧪 Run force emergence tests
        run: |
          python -m pytest tests/test_forces --maxfail=5 --cov=src/forces

      - name: 🧪 Run simulation tests
        run: |
          python -m pytest tests/test_simulation --maxfail=5 --cov=src/simulation

      - name: 🧪 Run experimental tests
        run: |
          python -m pytest tests/test_experimental --maxfail=5 --cov=src/experimental

      - name: 🧼 Type checking with mypy
        if: matrix.os == 'ubuntu-latest'
        run: |
          mypy src/ --config-file=mypy.ini

      - name: 📊 Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          fail_ci_if_error: false
          verbose: true

  cpp-tests:
    name: 🔧 C++ Implementation Tests
    runs-on: ubuntu-latest
    
    steps:
      - name: ⬇️ Checkout repository
        uses: actions/checkout@v3
        with:
          submodules: recursive

      - name: 🛠️ Install CMake and Ninja
        uses: lukka/get-cmake@latest

      - name: 📦 Install C++ dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libboost-dev

      - name: 📂 Create build directory
        run: mkdir -p cpp/build

      - name: ⚙️ Configure CMake
        working-directory: cpp/build
        run: cmake .. -GNinja -DCMAKE_BUILD_TYPE=Debug -DBUILD_TESTING=ON

      - name: 🔨 Build C++ code
        working-directory: cpp/build
        run: ninja

      - name: 🧪 Run C++ tests
        working-directory: cpp/build
        run: ctest --output-on-failure

  cuda-tests:
    name: 🚀 CUDA Implementation Tests
    runs-on: ubuntu-latest
    needs: cpp-tests
    if: always() && (needs.cpp-tests.result == 'success' || needs.cpp-tests.result == 'skipped')
    
    steps:
      - name: ⬇️ Checkout repository
        uses: actions/checkout@v3
        with:
          submodules: recursive

      - name: 🛠️ Set up CUDA toolkit
        uses: Jimver/cuda-toolkit@v0.2.10
        id: cuda-toolkit
        with:
          cuda: '12.0.0'
          method: 'network'
          sub-packages: '["nvcc", "cudart", "cublas", "cufft"]'

      - name: 📂 Create build directory
        run: mkdir -p cuda/build

      - name: ⚙️ Configure CMake for CUDA
        working-directory: cuda/build
        run: |
          cmake .. -DCMAKE_BUILD_TYPE=Debug -DBUILD_TESTING=ON

      - name: 🔨 Build CUDA code
        working-directory: cuda/build
        run: make -j$(nproc)

      - name: 🧪 Run CUDA tests
        working-directory: cuda/build
        run: ctest --output-on-failure

  integration-tests:
    name: 🧩 Integration Tests
    runs-on: ubuntu-latest
    needs: [python-core-tests, cpp-tests]
    if: always() && (needs.python-core-tests.result == 'success' && (needs.cpp-tests.result == 'success' || needs.cpp-tests.result == 'skipped'))
    
    services:
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    
    env:
      REDIS_HOST: localhost
      REDIS_PORT: 6379
      API_SECRET_KEY: test-key-integration-${{ github.run_id }}
      PYTHONPATH: ${{ github.workspace }}

    steps:
      - name: ⬇️ Checkout repository
        uses: actions/checkout@v3
        with:
          submodules: recursive

      - name: 🐍 Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: |
            requirements*.txt
            pyproject.toml
            setup.py

      - name: 📦 Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install wheel setuptools
          python -m pip install -e .[dev,test]
          python -m pip install -r requirements.txt
          python -m pip install -r requirements-dev.txt

      - name: 🛠️ Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libboost-dev

      - name: 📂 Create C++ build directory and build
        run: |
          mkdir -p cpp/build
          cd cpp/build
          cmake .. -DCMAKE_BUILD_TYPE=Release
          make -j$(nproc)

      - name: 🧪 Run integration tests
        run: |
          python -m pytest tests/test_integration --maxfail=2 --cov=src

      - name: 📊 Upload integration test coverage
        uses: codecov/codecov-action@v3
        with:
          fail_ci_if_error: false
          verbose: true
          flags: integration

  web-tests:
    name: 🌐 Web Frontend Tests
    runs-on: ubuntu-latest
    
    steps:
      - name: ⬇️ Checkout repository
        uses: actions/checkout@v3

      - name: 🧪 Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: 📦 Install frontend dependencies
        run: |
          cd web
          npm ci

      - name: 🧼 Run ESLint
        run: |
          cd web
          npm run lint

      - name: 📐 Run TypeScript type checking
        run: |
          cd web
          npm run type-check

      - name: ✅ Run unit tests
        run: |
          cd web
          npm test -- --watchAll=false --coverage

      - name: 📊 Upload frontend test coverage
        uses: codecov/codecov-action@v3
        with:
          directory: ./web/coverage
          fail_ci_if_error: false
          flags: frontend

  api-tests:
    name: 🔌 API Server Tests
    runs-on: ubuntu-latest
    needs: [python-core-tests]
    if: always() && (needs.python-core-tests.result == 'success' || needs.python-core-tests.result == 'skipped')
    
    services:
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    
    env:
      REDIS_HOST: localhost
      REDIS_PORT: 6379
      API_SECRET_KEY: test-key-api-${{ github.run_id }}
      PYTHONPATH: ${{ github.workspace }}

    steps:
      - name: ⬇️ Checkout repository
        uses: actions/checkout@v3

      - name: 🐍 Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: |
            requirements*.txt
            pyproject.toml
            setup.py

      - name: 📦 Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install wheel setuptools
          python -m pip install -e .[dev,test]
          python -m pip install -r requirements.txt
          python -m pip install -r requirements-dev.txt

      - name: 🧪 Run API server tests
        run: |
          python -m pytest api/tests --maxfail=2 --cov=api

      - name: 📊 Upload API test coverage
        uses: codecov/codecov-action@v3
        with:
          fail_ci_if_error: false
          flags: api-server

  benchmarks:
    name: 📈 Performance Benchmarks
    runs-on: ubuntu-latest
    needs: [python-core-tests, cpp-tests]
    if: github.event_name == 'pull_request' && (needs.python-core-tests.result == 'success' && (needs.cpp-tests.result == 'success' || needs.cpp-tests.result == 'skipped'))
    
    env:
      PYTHONPATH: ${{ github.workspace }}

    steps:
      - name: ⬇️ Checkout repository
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: 🐍 Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: |
            requirements*.txt
            pyproject.toml
            setup.py

      - name: 📦 Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install wheel setuptools
          python -m pip install -e .[dev,test]
          python -m pip install -r requirements.txt
          python -m pip install -r requirements-dev.txt

      - name: 🏃 Run key performance benchmarks
        run: |
          python -m pytest benchmarks/benchmark_core.py benchmarks/benchmark_interaction.py benchmarks/benchmark_force_extraction.py --benchmark-only --benchmark-autosave --benchmark-compare

      - name: 📊 Generate benchmark report
        run: |
          python scripts/analysis/generate_benchmark_report.py

      - name: 📤 Upload benchmark results
        uses: actions/upload-artifact@v3
        with:
          name: benchmark-results
          path: .benchmarks/

  docker-build-test:
    name: 🐳 Docker Build Test
    runs-on: ubuntu-latest
    needs: [python-core-tests, web-tests]
    if: always() && (needs.python-core-tests.result == 'success' && needs.web-tests.result == 'success')
    
    steps:
      - name: ⬇️ Checkout repository
        uses: actions/checkout@v3

      - name: 🏗️ Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: 🔨 Build main Docker image
        uses: docker/build-push-action@v4
        with:
          context: .
          file: docker/Dockerfile
          push: false
          load: true
          tags: axabsent:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: ✅ Test Docker image
        run: |
          docker run --rm axabsent:test python -m pytest tests/test_core/test_absolute.py -v

  code-quality:
    name: 🧹 Code Quality Checks
    runs-on: ubuntu-latest
    
    steps:
      - name: ⬇️ Checkout repository
        uses: actions/checkout@v3

      - name: 🐍 Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 📦 Install code quality tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install flake8 black isort bandit safety radon xenon

      - name: 🧼 Run Black code formatter check
        run: |
          black --check src/ tests/ api/ benchmarks/

      - name: 🧼 Run isort check
        run: |
          isort --check-only --profile black src/ tests/ api/ benchmarks/

      - name: 🧼 Run Flake8 linting
        run: |
          flake8 src/ tests/ api/ benchmarks/

      - name: 🔒 Run Bandit security checks
        run: |
          bandit -r src/ api/ -c .bandit.yml -s B101

      - name: 📊 Run Radon complexity checks
        run: |
          radon cc src/ api/ -a -nc

      - name: 📊 Run Code Metrics
        run: |
          xenon --max-absolute B --max-modules A --max-average A src/

  documentation:
    name: 📚 Documentation Build
    runs-on: ubuntu-latest
    needs: [python-core-tests]
    if: always() && (needs.python-core-tests.result == 'success' || needs.python-core-tests.result == 'skipped')
    
    steps:
      - name: ⬇️ Checkout repository
        uses: actions/checkout@v3

      - name: 🐍 Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: |
            requirements*.txt
            requirements-docs.txt
            pyproject.toml
            setup.py

      - name: 📦 Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .
          python -m pip install -r requirements-docs.txt

      - name: 🔨 Build documentation
        run: |
          cd docs
          make html SPHINXOPTS="-W --keep-going -n"

      - name: 📤 Upload documentation
        uses: actions/upload-artifact@v3
        with:
          name: documentation
          path: docs/_build/html/

  notification:
    name: 📢 Notification
    runs-on: ubuntu-latest
    needs: [python-core-tests, cpp-tests, web-tests, api-tests, integration-tests, documentation]
    if: always()
    
    steps:
      - name: 📋 Generate test summary
        run: |
          echo "### Test Results" >> $GITHUB_STEP_SUMMARY
          echo "| Test Type | Status |" >> $GITHUB_STEP_SUMMARY
          echo "| --- | --- |" >> $GITHUB_STEP_SUMMARY
          echo "| Python Core Tests | ${{ needs.python-core-tests.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| C++ Tests | ${{ needs.cpp-tests.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Web Frontend Tests | ${{ needs.web-tests.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| API Server Tests | ${{ needs.api-tests.result }} |" >> $GITHUB_STEP_SUMMARY 
          echo "| Integration Tests | ${{ needs.integration-tests.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Documentation | ${{ needs.documentation.result }} |" >> $GITHUB_STEP_SUMMARY

      - name: 🚨 Check run status
        if: contains(needs.*.result, 'failure')
        run: exit 1
