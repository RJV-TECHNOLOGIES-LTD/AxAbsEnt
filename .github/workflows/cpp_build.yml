/
name: C++ CI

on:
  push:
    paths:
      - 'cpp/**'
      - 'CMakeLists.txt'
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y cmake g++ libeigen3-dev

      - name: Configure
        run: cmake -S cpp -B build

      - name: Build
        run: cmake --build build --config Release
