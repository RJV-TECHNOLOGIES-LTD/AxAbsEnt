# .github/workflows/kubernetes.yml
name: Deploy to Kubernetes

on:
  push:
    branches: [ main ]
    paths:
      - 'k8s/**'
      - '.github/workflows/kubernetes.yml'

jobs:
  deploy:
    name: Kubernetes Apply
    runs-on: ubuntu-latest

    steps:
      - name: ⬇️ Checkout code
        uses: actions/checkout@v3

      - name: ☸️ Set up Kubeconfig
        uses: azure/setup-kubectl@v3
        with:
          version: '1.27.0'

      - name: 🔐 Authenticate to Kubernetes cluster
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBE_CONFIG }}" | base64 -d > ~/.kube/config

      - name: 🚀 Apply AxAbsEnt Kubernetes Manifests
        run: |
          kubectl apply -f k8s/axabsent-configmap.yaml
          kubectl apply -f k8s/axabsent-secret.yaml
          kubectl apply -f k8s/axabsent-service.yaml
          kubectl apply -f k8s/axabsent-deployment.yaml
          kubectl apply -f k8s/gpu-deployment.yaml
          kubectl apply -f k8s/monitoring.yaml

      - name: 🧪 Verify Deployments
        run: |
          kubectl rollout status deployment/axabsent-deployment -n axabsent-system
          kubectl rollout status deployment/axabsent-gpu-deployment -n axabsent-system
