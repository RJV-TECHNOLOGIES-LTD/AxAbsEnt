# k8s/axabsent-service.yaml
apiVersion: v1
kind: Service
metadata:
  name: axabsent-api-service
  namespace: axabsent-system
  labels:
    app: axabsent-api
    tier: backend
    project: axabsent
    environment: production
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: "8000"
    prometheus.io/path: "/metrics"
spec:
  selector:
    app: axabsent-api
  type: ClusterIP
  ports:
    - name: http
      protocol: TCP
      port: 8000
      targetPort: 8000
