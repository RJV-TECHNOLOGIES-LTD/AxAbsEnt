# k8s/axabsent-deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: axabsent-api-deployment
  namespace: axabsent-system
  labels:
    app: axabsent-api
    tier: backend
    project: axabsent
    version: v1
    environment: production
spec:
  replicas: 3
  selector:
    matchLabels:
      app: axabsent-api
  template:
    metadata:
      labels:
        app: axabsent-api
        version: v1
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8000"
    spec:
      containers:
        - name: axabsent-api
          image: rjvtechnologies/axabsent:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
          env:
            - name: AXABSENT_ENV
              value: production
            - name: REDIS_HOST
              valueFrom:
                configMapKeyRef:
                  name: axabsent-config
                  key: redis_host
            - name: REDIS_PORT
              valueFrom:
                configMapKeyRef:
                  name: axabsent-config
                  key: redis_port
            - name: API_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: axabsent-secret
                  key: api_secret_key
          resources:
            limits:
              cpu: "1000m"
              memory: "1Gi"
            requests:
              cpu: "500m"
              memory: "512Mi"
          volumeMounts:
            - name: shared-logs
              mountPath: /var/log/axabsent
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /ready
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 2
          lifecycle:
            preStop:
              exec:
                command: ["/bin/sh", "-c", "sleep 10"]
      restartPolicy: Always
      terminationGracePeriodSeconds: 30
      volumes:
        - name: shared-logs
          emptyDir: {}
