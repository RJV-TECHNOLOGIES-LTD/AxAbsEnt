version: '3.9'

services:
  axabsent-dev:
    build:
      context: .
      dockerfile: docker/Dockerfile.dev
    container_name: axabsent-dev
    ports:
      - "8000:8000"
    volumes:
      - .:/app:cached
    environment:
      - RELOAD=true
      - LOG_LEVEL=debug
    command: uvicorn api.server:app --host 0.0.0.0 --port 8000 --reload
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 3s
      retries: 3
