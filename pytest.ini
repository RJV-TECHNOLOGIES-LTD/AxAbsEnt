[pytest]
# 🔍 Test Discovery
minversion = 8.0
addopts = --strict-markers --tb=short --showlocals -ra -q --cov=src/axabsent --cov-report=term
testpaths = 
    tests
    src/axabsent
    api

# ✅ Python file pattern matching for test collection
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# 🧠 Custom markers for ontology / theory layer separation
markers =
    ontology: marks tests validating CEFT/SDI/FDT/SRI axioms (deselect with '-m "not ontology"')
    simulation: tests numerical simulation layers, GPU/CPU dynamics
    slow: marks long-running tests (e.g. Monte Carlo, resonance mapping)
    integration: tests full pipelines from absolute definition to field emergence
    api: tests FastAPI endpoints and ontological inputs
    visualization: tests interactive/3D plotting, data views
    experimental: tests related to observable predictions and falsifiability

# 🧾 Logging
log_cli = true
log_cli_level = INFO
log_format = [%(levelname)s] [%(name)s]: %(message)s
log_date_format = %Y-%m-%d %H:%M:%S

# ⚠️ Warning Handling
filterwarnings =
    error
    ignore::DeprecationWarning:torch.*
    ignore::DeprecationWarning:numpy.*
    ignore::PendingDeprecationWarning
    ignore::UserWarning:matplotlib.*
    ignore::UserWarning:h5py.*
    ignore::ImportWarning
    default::RuntimeWarning

# 🧪 Coverage Configuration (used in tox/CI)
xfail_strict = true
cache_dir = .pytest_cache
